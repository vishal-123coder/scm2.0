<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Page</title>
</head>
<body>
    <h1>this is about page</h1>
    <hr>
    <!-- using fragment -->
    <div class="host-tag" th:replace="${isLogin} ? ~{base :: parent(~{::section})}: ~{base :: test(~{::#not_logged_in})}">
        <section>
            <h1>User is logged in</h1>
        <h2>this is dynamic content</h2>
        <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Perspiciatis, vero.</p>
        <button>Click on Dynamic Content</button>
        <section id="not_logged_in">
            <h1>User is not_logged_in</h1>
        </section>
    </div>
</body>
</html>
