<!DOCTYPE html>
<html
  lang="en"
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{base :: parent(~{::#content}, ~{::title}, ~{::script})}">
<head>
  <!-- Title Fragment -->
  <th:block th:fragment="title">
    <title>
      Add Contact
    </title>
  </th:block>
</head>
<body>

  <div id="content">

    <!--  user is logged in : sidebar -->
      <div th:if="${loggedInUser}">
        <div th:replace="~{user/sidebar::sidebar}"></div>
      </div>


  <!-- Main Content -->
   <div class="pl-64 pt-[190px] px-4 min-h-screen">
  <div class="max-w-3xl mx-auto">
    <div class="card block p-6 bg-white border border-gray-200 rounded-lg shadow-sm hover:bg-gray-100 dark:bg-gray-800 dark:border-gray-700 dark:hover:bg-gray-700">

      <div data-th-replace="~{message::messagebox}"></div>
      
      <h1 class="text-2xl font-bold">Add new Contact</h1>
      <p class="text-gray-400">This contact will be saved in cloud, you can directly email to this contact from SCM...</p>

      <!-- form continues here -->


        <form 
        action="" 
        class="mt-8"
        data-th-action="@{'/user/contacts/add'}"
        data-th-object="${contactForm}"
        method="post"
        
        >
            <!--name form -->
         <div class="mb-3 mt-5">
            <label for="NameForm" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white text-left">Contact Name</label>
            <div class="relative mb-1">
             <div class="absolute inset-y-0 start-0 flex items-center ps-3.5 pointer-events-none">
                <i class="fa-solid fa-user h-4 w-4"></i>
             </div>
               <input 
                  data-th-field="*{name}"
                  type="text" 
                  id="NameForm" 
                  class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full ps-10 p-2.5  dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" 
                  placeholder="name"
                  />
            </div>
            <p
              class="text-red-500 text-left"
              th:if="${#fields.hasErrors('name')}"
              data-th-errors="*{name}"
            >
             Invalid Name
            </p>
           </div>

         <!--contact email -->
         <div class="mb-3 mt-5">
           <label for="ContactEmail" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white text-left">Contact Email</label>
           <div class="relative">
             <div class="absolute inset-y-0 start-0 flex items-center ps-3.5 pointer-events-none">
                <i class="fa-solid fa-envelope h-4 w-4"></i>
             </div>
               <input 
                  type="text" 
                  data-th-field="*{email}"
                  class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full ps-10 p-2.5  dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" 
                  placeholder="example@gmail.com">
            </div>
            <p
              class="text-red-500 text-left"
              th:if="${#fields.hasErrors('email')}"
              data-th-errors="*{email}"
            >
             Invalid Name
            </p>
         </div>

         <!--contact number -->
         <div class="mb-3 mt-5">
           <label for="ContactNumber" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white text-left"
           >Contact number</label>
           <div class="relative">
             <div class="absolute inset-y-0 start-0 flex items-center ps-3.5 pointer-events-none">
                <i class="fa-solid fa-phone"></i>
             </div>
               <input 
                 type="text" 
                 data-th-field="*{phoneNumber}" 
                 class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full ps-10 p-2.5  dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" 
                 placeholder="phone number">
           </div>
           <p
              class="text-red-500 text-left"
              th:if="${#fields.hasErrors('phoneNumber')}"
              data-th-errors="*{phoneNumber}"
            >
             Invalid Name
            </p>
         </div>

         <!-- Contact Adress -->
          <div class="mb-3">
            <label 
              for="ContactAddress" 
              class="block mb-2 text-sm font-medium text-left text-gray-900 dark:text-white"
              >Contact Address</label
            >
            <textarea 
              data-th-field="*{address}" 
              rows="4" 
              class="block p-2.5 w-full text-sm text-gray-900 bg-gray-50 rounded-lg border border-gray-300 focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" 
              placeholder="Adress of your contact">
            </textarea>
            <p
              class="text-red-500 text-left"
              th:if="${#fields.hasErrors('address')}"
              data-th-errors="*{address}"
            >
             Invalid Name
            </p>
          </div>

          <!-- Description -->
          <div class="mb-3">
            <label 
              for="Description" 
              class="block mb-2 text-sm font-medium text-left text-gray-900 dark:text-white"
              >Contact Description</label
            >
            <textarea 
              data-th-field="*{description}" 
              rows="4" 
              class="block p-2.5 w-full text-sm text-gray-900 bg-gray-50 rounded-lg border border-gray-300 focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" 
              placeholder="Write about your contact here"
              ></textarea>
          </div>

         <!-- Social Links -->
       <div class="flex space-x-3 mb-3">
         <div class="w-full">
          <!-- Website link -->
           <div class="mb-3">
             <div class="relative mb-6">
               <div 
                 class="absolute inset-y-0 start-0 flex items-center ps-3.5 pointer-events-none"
               >
                 <i class="fa-solid w-4 h-4 fa-earth-americas"></i>
               </div>
               <input 
                 type="text" 
                 data-th-field="*{websiteLink}"
                 class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full ps-10 p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" 
                 placeholder="http://example.com"/>
             </div>
           </div>
         </div>
      
         <div class="w-full">
           <!-- LinkedIn link -->
           <div class="mb-3">
             <div class="relative mb-6">
               <div 
                 class="absolute inset-y-0 start-0 flex items-center ps-3.5 pointer-events-none"
               >
                 <i class="fa-brands fa-linkedin h-4 w-4"></i>
               </div>
               <input 
                 type="text" 
                 data-th-field="*{linkedInLink}" 
                 class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full ps-10 p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" 
                 placeholder="LinkedIn Profile URL"/>
             </div>
           </div>
         </div>
       </div>


        <!-- Contact Image -->
        <div class="mb-3">
          <label for="contactImage" class="block mb-2 text-left text-sm font-medium text-gray-900 dark:text-white">Contact Image</label>
          <input 
           class="block w-full text-sm text-gray-900 border border-gray-300 rounded-lg cursor-pointer bg-gray-50 dark:text-gray-400 focus:outline-none dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400" 
           id="contactImage"
           data-th-field="*{profileImage}"
           type="file"
          >
       </div>

     <!-- Favorite Checkbox -->
       <div class="mt-4">
         <div class="flex items-center">
          <input
           data-th-field="*{favorite}"
           placeholder="true"
           name="favorite"
           type="checkbox"
           class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded-sm focus:ring-blue-500 dark:focus:ring-blue-600 dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600"
         />
         <label for="favoriteCheckbox" class="ms-2 text-sm font-medium text-gray-900 dark:text-gray-300">
           Favorite contact
         </label>
        </div>
       </div>
 
      <!-- Buttons -->
      <div class="button-container mb-3 text-center">
        <button type="submit" class="px-3 py-2 rounded bg-gray-800 hover:bg-gray-700 text-white dark:bg-blue-800 dark:hover:bg-blue-900">
          Add Contact
        </button>
        <button type="reset" class="px-3 py-2 rounded bg-red-600 hover:bg-red-700 text-white dark:bg-red-600 dark:hover:bg-red-700">
          Reset
        </button>
      </div>


     </form>
        

        </div>
      </div>
    </div>
  </div>

   <!-- Script Fragment -->
    <th:block th:fragment="script">
      <script>
        console.log("this is profile page");
      </script>
    </th:block>
  </body>
 </html>
