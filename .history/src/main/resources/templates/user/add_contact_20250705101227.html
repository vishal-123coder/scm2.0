<!DOCTYPE html>
<html
  lang="en"
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{base :: parent(~{::#content}, ~{::title}, ~{::script})}">

<head>
  <!-- Title Fragment -->
  <th:block th:fragment="title">
    <title>Add Contact</title>
  </th:block>
</head>

<body>
  <div id="content">

    <!-- Sidebar only if user is logged in -->
    <div th:if="${loggedInUser}">
      <div th:replace="~{user/sidebar :: sidebar}"></div>
    </div>

    <!-- Main Content Area -->
    <div class="sm:pl-64 pt-36 px-4 min-h-screen">
      <div class="max-w-3xl mx-auto">
        <div
          class="card block p-6 bg-white border border-gray-200 rounded-lg shadow-sm hover:bg-gray-100 dark:bg-gray-800 dark:border-gray-700 dark:hover:bg-gray-700">

          <h1 class="text-2xl font-bold">Add Contact</h1>
          <p class="text-gray-400">
            This contact will be saved in the cloud. You can directly email this contact from SCM.
          </p>

          <form action="" class="mt-6 space-y-6">

            <!-- Contact Name -->
            <div>
              <label for="name" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Contact Name</label>
              <div class="relative">
                <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                  <i class="fa-solid fa-user h-4 w-4"></i>
                </div>
                <input type="text" id="name"
                  class="ps-10 p-2.5 w-full text-sm rounded-lg border bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white border-gray-300 dark:border-gray-600 placeholder-gray-400 focus:ring-blue-500 focus:border-blue-500 dark:focus:ring-blue-500 dark:focus:border-blue-500"
                  placeholder="Name">
              </div>
            </div>

            <!-- Contact Email -->
            <div>
              <label for="email" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Contact Email</label>
              <div class="relative">
                <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                  <i class="fa-solid fa-envelope h-4 w-4"></i>
                </div>
                <input type="text" id="email"
                  class="ps-10 p-2.5 w-full text-sm rounded-lg border bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white border-gray-300 dark:border-gray-600 placeholder-gray-400 focus:ring-blue-500 focus:border-blue-500 dark:focus:ring-blue-500 dark:focus:border-blue-500"
                  placeholder="example@gmail.com">
              </div>
            </div>

            <!-- Contact Number -->
            <div>
              <label for="number" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Contact Number</label>
              <div class="relative">
                <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                  <i class="fa-solid fa-phone"></i>
                </div>
                <input type="text" id="number"
                  class="ps-10 p-2.5 w-full text-sm rounded-lg border bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white border-gray-300 dark:border-gray-600 placeholder-gray-400 focus:ring-blue-500 focus:border-blue-500 dark:focus:ring-blue-500 dark:focus:border-blue-500"
                  placeholder="Phone number">
              </div>
            </div>

            <!-- Address -->
            <div>
              <label for="address" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Contact Address</label>
              <textarea id="address" rows="3"
                class="block p-2.5 w-full text-sm rounded-lg border bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white border-gray-300 dark:border-gray-600 placeholder-gray-400 focus:ring-blue-500 focus:border-blue-500 dark:focus:ring-blue-500 dark:focus:border-blue-500"
                placeholder="Address of your contact"></textarea>
            </div>

            <!-- Description -->
            <div>
              <label for="description" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Contact Description</label>
              <textarea id="description" rows="3"
                class="block p-2.5 w-full text-sm rounded-lg border bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white border-gray-300 dark:border-gray-600 placeholder-gray-400 focus:ring-blue-500 focus:border-blue-500 dark:focus:ring-blue-500 dark:focus:border-blue-500"
                placeholder="Write about your contact here"></textarea>
            </div>

            <!-- Social Links -->
            <div class="flex flex-col md:flex-row gap-4">
              <div class="w-full">
                <div class="relative">
                  <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                    <i class="fa-solid fa-globe"></i>
                  </div>
                  <input type="text"
                    class="ps-10 p-2.5 w-full text-sm rounded-lg border bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white border-gray-300 dark:border-gray-600 placeholder-gray-400 focus:ring-blue-500 focus:border-blue-500 dark:focus:ring-blue-500 dark:focus:border-blue-500"
                    placeholder="http://example.com">
                </div>
              </div>

              <div class="w-full">
                <div class="relative">
                  <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                    <i class="fa-solid fa-globe"></i>
                  </div>
                  <input type="text"
                    class="ps-10 p-2.5 w-full text-sm rounded-lg border bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white border-gray-300 dark:border-gray-600 placeholder-gray-400 focus:ring-blue-500 focus:border-blue-500 dark:focus:ring-blue-500 dark:focus:border-blue-500"
                    placeholder="http://example.com">
                </div>
              </div>
            </div>

          </form>

        </div>
      </div>
    </div>
  </div>

  <!-- Script Fragment -->
  <th:block th:fragment="script">
    <script>
      console.log("this is add-contact page");
    </script>
  </th:block>
</body>

</html>
