<!DOCTYPE html>
<html
  lang="en"
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{base :: parent(~{::#content}, ~{::title}, ~{::script})}">
<head>
  <!-- Title Fragment -->
  <th:block th:fragment="title">
    <title>
      Add Contact
    </title>
  </th:block>
</head>
<body>

  <div id="content">

    <!--  user is logged in : sidebar -->
      <div th:if="${loggedInUser}">
        <div th:replace="~{user/sidebar::sidebar}"></div>
      </div>


  <!-- Main Content -->
    <div class="sm:pl-64 pt-20" style="height: 1000px">
  <div class="grid grid-cols-12">
    <div class="col-span-3 "></div>
    <div class="col-span-12 md:col-span-6 border">
      <div class="card block p-6 bg-white border border-gray-200 rounded-lg shadow-sm hover:bg-gray-100 dark:bg-gray-800 dark:border-gray-700 dark:hover:bg-gray-700">
        <h1 class="text-2xl font-bold">Add Contact</h1>
        <p class="text-gray-400">this contact will be saved in cloud, you can direct email to this 
            contact from SCM...
        </p>

        <form action="">
            <!--name form -->
             <div class="mb-3 mt-5">
            <label for="input-group-1" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white text-left">Contact Name</label>
           <div class="relative">
             <div class="absolute inset-y-0 start-0 flex items-center ps-3.5 pointer-events-none">
                <i class="fa-solid fa-user h-4 w-4"></i>
             </div>
               <input 
                  type="text" 
                  id="input-group-1" 
                  class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full ps-10 p-2.5  dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" 
                  placeholder="name">
            </div>
         </div>

         <!--contact email -->
             <div class="mb-3 mt-5">
            <label for="input-group-1" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white text-left">Contact Email</label>
           <div class="relative">
             <div class="absolute inset-y-0 start-0 flex items-center ps-3.5 pointer-events-none">
                <i class="fa-solid fa-envelope h-4 w-4"></i>
             </div>
               <input 
                  type="text" 
                  id="input-group-1" 
                  class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full ps-10 p-2.5  dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" 
                  placeholder="example@gmail.com">
            </div>
         </div>

         <!--contact number -->
             <div class="mb-3 mt-5">
            <label for="input-group-1" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white text-left"
            >Contact number</label>
           <div class="relative">
             <div class="absolute inset-y-0 start-0 flex items-center ps-3.5 pointer-events-none">
                <i class="fa-solid fa-phone"></i>
             </div>
               <input 
                  type="text" 
                  id="input-group-1" 
                  class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full ps-10 p-2.5  dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" 
                  placeholder="phone number">
            </div>
         </div>

         <!-- Contact Adress -->
          <div class="mb-3">
            <label 
              for="message" 
              class="block mb-2 text-sm font-medium text-left text-gray-900 dark:text-white"
              >Contact Address</label
            >
            <textarea 
              id="message" 
              rows="4" 
              class="block p-2.5 w-full text-sm text-gray-900 bg-gray-50 rounded-lg border border-gray-300 focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" 
              placeholder="Adress of your contact"></textarea>

          </div>

          <!-- Description -->
          <div class="mb-3">
            <label 
              for="message" 
              class="block mb-2 text-sm font-medium text-left text-gray-900 dark:text-white"
              >Contact Description</label
            >
            <textarea 
              id="message" 
              rows="4" 
              class="block p-2.5 w-full text-sm text-gray-900 bg-gray-50 rounded-lg border border-gray-300 focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" 
              placeholder="Write about your contact here"
              ></textarea>
          </div>

          <!--Social links-->
          <div class="flex">
              <div class="w-full"> 
                 <!--website link -->
                  <div class="mb-3 mt-5">
                  <div class="relative">
                  <div class="absolute inset-y-0 start-0 flex items-center ps-3.5 pointer-events-none">
                      <i class="fa-solid fa-globe"></i>
                  </div>
                     <input 
                      type="text" 
                      id="input-group-1" 
                      class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full ps-10 p-2.5  dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" 
                      placeholder="http://example.com">
                  </div>
              </div>    
             </div>
            <div class="w-full"> 
              
            </div>
          </div>

        </form>
        
        


      </div>
    </div>
  </div>
</div>

  <!-- Script Fragment -->
  <th:block th:fragment="script">
    <script>
      console.log("this is profile page");
    </script>
  </th:block>
</body>
</html>
