<!-- user/user_navbar.html -->
<nav
  th:fragment="user-navbar"
  class="bg-white border-gray-900 shadow-sm dark:bg-gray-900 sm:pl-64 fixed w-full top-0 left-0 right-0 z-50"
>
  <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4">
    
    <!-- Sidebar toggle (left) -->
    <button 
      data-drawer-target="logo-sidebar" 
      data-drawer-toggle="logo-sidebar" 
      aria-controls="logo-sidebar" 
      type="button" 
      class="inline-flex items-center p-2 text-sm text-gray-500 rounded-lg sm:hidden hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-gray-200 dark:text-gray-400 dark:hover:bg-gray-700 dark:focus:ring-gray-600"
    >
      <span class="sr-only">Open sidebar</span>
      <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
        <path fill-rule="evenodd" clip-rule="evenodd" d="M2 4.75A.75.75..."/>
      </svg>
    </button>

    <!-- Logo & title -->
    <a data-th-href="@{'/'}" class="flex items-center space-x-3 rtl:space-x-reverse">
      <img data-th-src="@{'/images/telephone.png'}" class="h-8 shadow rounded-full" alt="Flowbite Logo" />
      <span class="self-center text-2xl font-semibold whitespace-nowrap dark:text-white">SCM2.0</span>
    </a>

    <!-- Right-side (theme, user, logout, menu toggle) -->
    <div class="flex gap-2 md:order-2 items-center">
      <!-- Theme toggle (always visible) -->
      <button
        id="theme_change_button"
        class="bg-gray-200 px-3 py-2 rounded-lg dark:bg-gray-600"
      >
        <i class="fa-solid fa-circle-half-stroke"></i> <span>Light</span>
      </button>

      <!-- Profile (only visible on md and up) -->
      <a
        data-th-href="@{'/user/profile'}"
        type="button"
        class="hidden md:inline-flex text-white bg-green-600 hover:bg-gray-900 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm px-4 py-2 text-center dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800"
      >
        <span th:text="${loggedInUser.name}"></span>
      </a>

      <!-- Logout (only visible on md and up) -->
      <a
        data-th-href="@{'/do-logout'}"
        type="button"
        class="hidden md:inline-flex text-white bg-red-600 hover:bg-gray-900 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm px-4 py-2 text-center dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800"
      >
        Logout
      </a>

      <!-- Hamburger (only on small screens) -->
      <button
        data-collapse-toggle="navbar-cta"
        type="button"
        class="inline-flex items-center p-2 w-10 h-10 justify-center text-sm text-gray-500 rounded-lg md:hidden hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-gray-200 dark:text-gray-400 dark:hover:bg-gray-700 dark:focus:ring-gray-600"
        aria-controls="navbar-cta"
        aria-expanded="false"
      >
        <span class="sr-only">Open main menu</span>
        <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 17 14">
          <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M1 1h15M1 7h15M1 13h15" />
        </svg>
      </button>
    </div>

    <!-- Collapsible Menu -->
    <div
      class="items-center justify-between hidden w-full md:flex md:w-auto md:order-1"
      id="navbar-cta"
    >
      <ul
        class="flex flex-col font-medium p-4 md:p-0 mt-4 border border-gray-100 rounded-lg bg-gray-50 md:space-x-8 rtl:space-x-reverse md:flex-row md:mt-0 md:border-0 md:bg-white dark:bg-gray-800 md:dark:bg-gray-900 dark:border-gray-700"
      >
        <li>
          <a data-th-href="@{'/home'}" class="block py-2 px-3 md:p-0 text-white bg-blue-700 rounded md:bg-transparent md:text-blue-700 md:dark:text-blue-500" aria-current="page">Home</a>
        </li>
        <li>
          <a data-th-href="@{'/about'}" class="block py-2 px-3 md:p-0 text-gray-900 rounded hover:bg-gray-100 md:hover:bg-transparent md:hover:text-blue-700 md:dark:hover:text-blue-500 dark:text-white dark:hover:bg-gray-700 dark:hover:text-white">About</a>
        </li>
        <li>
          <a data-th-href="@{'/services'}" class="block py-2 px-3 md:p-0 text-gray-900 rounded hover:bg-gray-100 md:hover:bg-transparent md:hover:text-blue-700 md:dark:hover:text-blue-500 dark:text-white dark:hover:bg-gray-700 dark:hover:text-white">Services</a>
        </li>
        <li>
          <a data-th-href="@{'/contact'}" class="block py-2 px-3 md:p-0 text-gray-900 rounded hover:bg-gray-100 md:hover:bg-transparent md:hover:text-blue-700 md:dark:hover:text-blue-500 dark:text-white dark:hover:bg-gray-700 dark:hover:text-white">Contact</a>
        </li>

        <!-- 👇 Profile & Logout for small screens -->
        <li class="md:hidden">
          <a
            data-th-href="@{'/user/profile'}"
            type="button"
            class="block text-white bg-green-600 hover:bg-gray-900 font-medium rounded-lg text-sm px-4 py-2 text-center mt-2 dark:bg-blue-600 dark:hover:bg-blue-700"
          >
            <span th:text="${loggedInUser.name}"></span>
          </a>
        </li>
        <li class="md:hidden">
          <a
            data-th-href="@{'/do-logout'}"
            type="button"
            class="block text-white bg-red-600 hover:bg-gray-900 font-medium rounded-lg text-sm px-4 py-2 text-center mt-2 dark:bg-blue-600 dark:hover:bg-blue-700"
          >
            Logout
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>
